<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asteroids From Scratch</title>
    <link rel="stylesheet" href="./src/styles.css?v=collector-panel" />
  </head>
  <body>
    <main class="game-shell">
      <div class="play-layout">
        <section class="component-panel processor-panel" aria-label="Resource processor">
          <div class="component-panel-title">
            <div>
              <strong>Processor</strong>
              <span>collected units arrive here</span>
            </div>
          </div>
          <canvas id="processor" width="320" height="180" aria-label="Resource processing canvas"></canvas>
          <fieldset class="processor-outputs">
            <legend>Output</legend>
          </fieldset>
        </section>

        <section class="space-panel">
          <section class="hud" aria-label="Game status">
            <div class="component-panel engine-panel" aria-label="Engine component">
              <div class="component-panel-title">
                <div>
                  <strong>Engine</strong>
                  <span id="ship-status">ship offline</span>
                </div>
              </div>
              <button id="ship-power" class="power-button" type="button" aria-pressed="false">
                Power Ship
              </button>
              <div class="mode-toggle" role="group" aria-label="Thrust direction">
                <label><input type="radio" name="thrust-mode" value="forward" checked /> Forward</label>
                <label><input type="radio" name="thrust-mode" value="reverse" /> Reverse</label>
              </div>
              <span>Fuel: <strong id="fuel-count">200</strong></span>
            </div>

            <div class="component-panel scanner-panel" aria-label="Scanner component">
              <div class="component-panel-title">
                <div>
                  <strong>Scanner</strong>
                  <span>resource sweep</span>
                </div>
              </div>
              <button id="ship-scan" class="scan-button" type="button">
                Scan
              </button>
              <div class="system-readout" aria-live="polite">
                <span>Scan: <strong id="scanergy-count">0%</strong></span>
              </div>
            </div>

            <div class="component-panel miner-panel" aria-label="Miner component">
              <div class="component-panel-title">
                <div>
                  <strong>Miner</strong>
                  <span>rock cutter</span>
                </div>
              </div>
              <label class="arm-toggle">
                <input id="miner-armed" type="checkbox" />
                Guns armed
              </label>
              <div class="system-readout" aria-live="polite">
                <span>Ammo: <strong id="ammo-count">100</strong></span>
              </div>
            </div>

            <div class="component-panel collector-panel" aria-label="Resource collector component">
              <div class="component-panel-title">
                <div>
                  <strong>Collector</strong>
                  <span>resource pull field</span>
                </div>
              </div>
              <label class="collector-control">
                <span>Range</span>
                <input id="collector-range" type="range" min="0" max="100" value="0" />
                <strong id="collector-range-count">0%</strong>
              </label>
            </div>

            <div class="controls">
              <span>A/D: rotate</span>
              <span>W: thrust</span>
              <span>S: brake</span>
              <span>Space: fire</span>
              <span>Scan: find resources</span>
            </div>
          </section>

          <canvas id="game" width="960" height="540" aria-label="Asteroids game canvas"></canvas>
        </section>

      </div>
    </main>

    <script type="module" src="./src/main.js?v=collector-panel"></script>
  </body>
</html>
